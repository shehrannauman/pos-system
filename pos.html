<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lithos POS</title>
  
  <!-- Link to the manifest file for PWA -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Add the service worker registration script -->
  <script>
    // Check if service worker is supported by the browser
    if ('serviceWorker' in navigator) {
      // Register the service worker for offline functionality
      navigator.serviceWorker.register('service-worker.js')
        .then(() => {
          console.log('Service Worker Registered');
        })
        .catch((err) => {
          console.log('Service Worker Registration Failed:', err);
        });
    }
  </script>

  <!-- Link to your CSS file -->
  <link rel="stylesheet" href="assets/styles.css">
  
  <!-- Add Media Queries for Mobile/Tablets -->
  <style>
    @media (max-width: 900px) {
      .sidebar {
        width: 120px;
      }
      .order-panel {
        width: 220px;
      }
      .products {
        grid-template-columns: auto-fill, minmax(120px, 1fr);
      }
    }

    @media (max-width: 600px) {
      .sidebar {
        width: 100px;
      }
      .order-panel {
        width: 180px;
      }
      .products {
        grid-template-columns: auto-fill, minmax(90px, 1fr);
      }
    }

    /* Touch-friendly buttons */
    button, .pay-bar, .print-btn {
      touch-action: manipulation; /* Prevents zoom and scroll during touch */
    }
  </style>
</head>
<body>

  <!-- Your POS content goes here -->
  <div class="sidebar">
    <!-- Sidebar content like categories -->
  </div>

  <div class="products">
    <!-- Product grid content -->
  </div>

  <div class="order-panel">
    <!-- Order summary panel -->
  </div>

  <!-- Link to your JavaScript files -->
  <script src="assets/scripts.js"></script>
</body>
</html>
