<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MOR POS - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body { margin:0; font-family:'Poppins',sans-serif; height:100vh; display:flex; justify-content:center; align-items:center; background: linear-gradient(135deg,#a6c0fe 0%,#f68084 100%); overflow:hidden;}
.login-container { background: rgba(255,255,255,0.2); backdrop-filter: blur(12px); padding:40px; border-radius:20px; box-shadow:0 8px 30px rgba(0,0,0,0.3); text-align:center; width:320px; animation: fadeIn 1s ease;}
h1 { margin-bottom:30px; color:white; font-weight:600; }
input { width:100%; padding:12px; margin:12px 0; border-radius:10px; border:none; font-size:16px; outline:none;}
button { padding:12px 20px; border:none; border-radius:10px; background:#4CAF50; color:white; font-size:16px; cursor:pointer; transition: transform 0.2s ease, background 0.2s ease; }
button:hover { background:#45a049; transform:scale(1.05);}
@keyframes fadeIn { from {opacity:0} to {opacity:1} }
</style>
</head>
<body>
<div class="login-container">
<h1>MOR POS</h1>
<input type="password" id="pinInput" placeholder="Enter PIN">
<button onclick="checkPin()">Enter</button>
</div>
<script>
if(!localStorage.getItem('adminPin')) localStorage.setItem('adminPin','1234');
if(!localStorage.getItem('salesPin')) localStorage.setItem('salesPin','0000');
function checkPin(){
  let pin=document.getElementById('pinInput').value;
  if(pin===localStorage.getItem('adminPin')) window.location.href='admin.html';
  else if(pin===localStorage.getItem('salesPin')) window.location.href='pos.html';
  else alert('Incorrect PIN!');
}
document.getElementById('pinInput').addEventListener('keypress',function(e){ if(e.key==='Enter'){ checkPin(); }});
</script>
</body>
</html>
