<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MOR POS - Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body { font-family:'Poppins',sans-serif; margin:0; background: linear-gradient(135deg,#a6c0fe 0%,#f68084 100%);}
h1 { text-align:center; color:white; text-shadow:0 2px 5px rgba(0,0,0,0.4); margin:20px 0; }
.container { display:flex; flex-wrap:wrap; gap:20px; justify-content:center; padding:10px; }
.card { background: rgba(255,255,255,0.2); backdrop-filter: blur(12px); padding:20px;
 border-radius:20px; min-width:300px; flex:1; box-shadow:0 8px 25px rgba(0,0,0,0.25); transition: transform 0.3s ease; }
.card:hover{ transform: translateY(-5px); }
.tabs{ display:flex; gap:10px; margin-bottom:10px; justify-content:center;}
.tab{ padding:10px 20px; cursor:pointer; border-radius:10px; background:rgba(255,255,255,0.2); backdrop-filter:blur(6px);}
.tab.active{ background:#4CAF50; color:white;}
input, select { width:100%; padding:10px; margin:5px 0; border-radius:10px; border:none; outline:none;}
button { padding:10px 15px; border:none; border-radius:10px; background:#4CAF50; color:white; cursor:pointer; margin:5px 0; transition:transform 0.2s ease;}
button:hover{ transform:scale(1.05); background:#45a049;}
ul{ list-style:none; padding:0;}
li{ display:flex; justify-content:space-between; align-items:center; padding:5px 0;}
li button{ background:#f44336; padding:4px 8px; border-radius:5px;}
img.product-img,img.category-img{ max-width:50px; max-height:50px; border-radius:5px; margin-right:5px; }
.switch-pos{ position:fixed; top:10px; right:10px; display:flex; gap:10px; z-index:999;}
</style>
</head>
<body>

<h1>MOR POS - Admin Dashboard</h1>

<div class="switch-pos">
  <button onclick="window.location.href='pos.html'">Switch to POS</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('categories')">Categories</div>
  <div class="tab" onclick="switchTab('products')">Products</div>
  <div class="tab" onclick="switchTab('tables')">Tables</div>
  <div class="tab" onclick="switchTab('pins')">PINs</div>
</div>

<div class="container">
  <div class="card" id="categoriesTab">
    <h3>Categories</h3>
    <input type="text" id="categoryName" placeholder="New Category">
    <input type="text" id="categoryImg" placeholder="Image URL (optional)">
    <button onclick="addCategory()">Add Category</button>
    <ul id="categoryList"></ul>
  </div>

  <div class="card" id="productsTab" style="display:none;">
    <h3>Products & Variants</h3>
    <input type="text" id="productName" placeholder="Product Name">
    <select id="productCategory"></select>
    <input type="text" id="variantName" placeholder="Variant Name">
    <input type="number" id="variantPrice" placeholder="Price">
    <input type="text" id="productImg" placeholder="Image URL">
    <button onclick="addProduct()">Add Product</button>
    <ul id="productList"></ul>
  </div>

  <div class="card" id="tablesTab" style="display:none;">
    <h3>Tables Management</h3>
    <input type="text" id="tableName" placeholder="Table Name">
    <button onclick="addTable()">Add Table</button>
    <ul id="tableList"></ul>
  </div>

  <div class="card" id="pinsTab" style="display:none;">
    <h3>Change PINs</h3>
    <input type="password" id="adminPin" placeholder="New Admin PIN">
    <button onclick="changeAdminPin()">Change Admin PIN</button>
    <input type="password" id="salesPin" placeholder="New Sales PIN">
    <button onclick="changeSalesPin()">Change Sales PIN</button>
  </div>
</div>

<script>
let categories = JSON.parse(localStorage.getItem('categories')) || [];
let products = JSON.parse(localStorage.getItem('products')) || [];
let tables = JSON.parse(localStorage.getItem('tables')) || [];

function saveData(){ 
  localStorage.setItem('categories',JSON.stringify(categories)); 
  localStorage.setItem('products',JSON.stringify(products)); 
  localStorage.setItem('tables',JSON.stringify(tables)); 
  displayAll(); 
}

function switchTab(tab){
  document.getElementById('categoriesTab').style.display=tab==='categories'?'block':'none';
  document.getElementById('productsTab').style.display=tab==='products'?'block':'none';
  document.getElementById('tablesTab').style.display=tab==='tables'?'block':'none';
  document.getElementById('pinsTab').style.display=tab==='pins'?'block':'none';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
}

// Categories
function addCategory(){
  let name=document.getElementById('categoryName').value.trim();
  let img=document.getElementById('categoryImg').value.trim();
  if(!name) return alert('Enter category'); 
  if(categories.find(c=>c.name===name)) return alert('Exists'); 
  categories.push({name:name,img:img});
  document.getElementById('categoryName').value=''; document.getElementById('categoryImg').value='';
  saveData();
}
function removeCategory(name){ 
  if(confirm('Delete this category?')){ 
    categories=categories.filter(c=>c.name!==name); 
    products=products.filter(p=>p.category!==name); 
    saveData(); 
  }
}
function displayCategories(){ 
  let ul=document.getElementById('categoryList'); 
  ul.innerHTML=''; 
  categories.forEach(c=>{ 
    let li=document.createElement('li'); 
    li.innerHTML=`${c.img?'<img class="category-img" src="'+c.img+'">':''}${c.name} <button onclick="removeCategory('${c.name}')">Remove</button>`; 
    ul.appendChild(li); 
  }); 
  let sel=document.getElementById('productCategory'); sel.innerHTML=''; 
  categories.forEach(c=>{ let opt=document.createElement('option'); opt.value=c.name; opt.innerText=c.name; sel.appendChild(opt); }); 
}

// Products
function addProduct(){
  let name=document.getElementById('productName').value.trim();
  let cat=document.getElementById('productCategory').value;
  let vName=document.getElementById('variantName').value.trim();
  let vPrice=parseFloat(document.getElementById('variantPrice').value);
  let img=document.getElementById('productImg').value.trim();
  if(!name||!vName||isNaN(vPrice)) return alert('Fill all');
  let prod=products.find(p=>p.name===name&&p.category===cat);
  if(prod){ prod.variants.push({name:vName,price:vPrice,img:img}); }
  else{ products.push({name:name,category:cat,variants:[{name:vName,price:vPrice,img:img}]}); }
  document.getElementById('productName').value=''; document.getElementById('variantName').value=''; document.getElementById('variantPrice').value=''; document.getElementById('productImg').value='';
  saveData();
}
function removeProduct(index){ if(confirm('Delete product?')){ products.splice(index,1); saveData(); }}
function displayProducts(){ 
  let ul=document.getElementById('productList'); ul.innerHTML=''; 
  products.forEach((p,i)=>{ 
    let li=document.createElement('li'); 
    li.innerHTML=`${p.name} (${p.category}) ${p.variants.map(v=>v.img?'<img class="product-img" src="'+v.img+'">':'') + v.name+'='+v.price}. <button onclick="removeProduct(${i})">Remove</button>`; 
    ul.appendChild(li); 
  }); 
}

// Tables
function addTable(){ 
  let t=document.getElementById('tableName').value.trim(); 
  if(!t) return alert('Enter table'); 
  if(tables.includes(t)) return alert('Exists'); 
  tables.push(t); 
  document.getElementById('tableName').value=''; 
  saveData(); 
}
function removeTable(t){ if(confirm('Delete table?')){ tables=tables.filter(tab=>tab!==t); saveData(); } }
function displayTables(){ 
  let ul=document.getElementById('tableList'); ul.innerHTML=''; 
  tables.forEach(t=>{ let li=document.createElement('li'); li.innerHTML=`${t} <button onclick="removeTable('${t}')">Remove</button>`; ul.appendChild(li); }); 
}

// PINs
function changeAdminPin(){ let pin=document.getElementById('adminPin').value.trim(); if(!pin) return alert('Enter PIN'); localStorage.setItem('adminPin',pin); alert('Admin PIN changed'); document.getElementById('adminPin').value=''; }
function changeSalesPin(){ let pin=document.getElementById('salesPin').value.trim(); if(!pin) return alert('Enter PIN'); localStorage.setItem('salesPin',pin); alert('Sales PIN changed'); document.getElementById('salesPin').value=''; }

function logout(){ window.location.href='index.html'; }

function displayAll(){ displayCategories(); displayProducts(); displayTables(); }
displayAll();
</script>
</body>
</html>
